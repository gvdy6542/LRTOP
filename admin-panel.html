<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body{font-family:Arial, sans-serif;margin:20px;}
    label{display:block;margin-bottom:6px;}
    input[type="text"]{width:100%;max-width:400px;}
    .row{margin-bottom:10px;}
    a.link{margin-left:6px}
  </style>
</head>
<body>
  <h2>Админ конфигурация</h2>

  <div class="row">
    <label>Parent Folder ID:
      <input type="text" id="parentFolderId">
      <a id="parentFolderIdLink" class="link" href="#" target="_blank" style="display:none">Линк</a>
    </label>
  </div>

  <div class="row">
    <label>Revision Folder ID:
      <input type="text" id="revisionParentFolderId">
      <a id="revisionParentFolderIdLink" class="link" href="#" target="_blank" style="display:none">Линк</a>
    </label>
  </div>

  <div class="row">
    <label>PPR Folder ID:
      <input type="text" id="pprFolderId">
      <a id="pprFolderIdLink" class="link" href="#" target="_blank" style="display:none">Линк</a>
    </label>
  </div>

  <h3>Бутони</h3>
  <label><input type="checkbox" id="showInterfaceButton"> Показвай "Обработка"</label>
  <label><input type="checkbox" id="showReferenceButton"> Показвай "ИНВЕНТАРИЗАЦИЯ"</label>
  <label><input type="checkbox" id="showLabelsButton"> Показвай "Етикети"</label>
  <label><input type="checkbox" id="showPprButtons"> Показвай бутоните за ППР</label>
  <label><input type="checkbox" id="showViewRevisionsBtn"> Показвай "Преглед на ревизии"</label>

  <div class="row" style="margin-top:12px">
    <button id="btnSave">Запази</button>
    <button id="btnRefreshAll">Обнови всички клиенти</button>
    <button id="btnRefreshItems">Обнови артикули</button>
  </div>

  <h3>Статистика</h3>
  <table id="clientStats" border="1" cellpadding="4" cellspacing="0">
    <thead>
      <tr><th>clientId</th><th>Брой</th><th>Последна активност</th><th>Текуща дейност</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script><?!= include('common'); ?></script>
  <script>
    function updateFolderLinks(){
      const pairs = [
        ['parentFolderId','parentFolderIdLink'],
        ['revisionParentFolderId','revisionParentFolderIdLink'],
        ['pprFolderId','pprFolderIdLink']
      ];
      pairs.forEach(([inputId, linkId]) => {
        const val = document.getElementById(inputId).value.trim();
        const a = document.getElementById(linkId);
        if (val) {
          a.href = 'https://drive.google.com/drive/folders/' + encodeURIComponent(val);
          a.style.display = 'inline';
        } else {
          a.removeAttribute('href');
          a.style.display = 'none';
        }
      });
    }

    function loadConfig(){
      google.script.run.withSuccessHandler(function(c){
        const toBool = v => /^(true|1)$/i.test(String(v).trim());
        document.getElementById('parentFolderId').value = c.parentFolderId || '';
        document.getElementById('revisionParentFolderId').value = c.revisionParentFolderId || '';
        document.getElementById('pprFolderId').value = c.pprFolderId || '';
        document.getElementById('showInterfaceButton').checked = !!toBool(c.showInterfaceButton);
        document.getElementById('showReferenceButton').checked = !!toBool(c.showReferenceButton);
        document.getElementById('showLabelsButton').checked = !!toBool(c.showLabelsButton);
        document.getElementById('showPprButtons').checked = !!toBool(c.showPprButtons);
        document.getElementById('showViewRevisionsBtn').checked = !!toBool(c.showViewRevisionsBtn);
        updateFolderLinks();
      }).getConfig();
    }

    function saveConfig(){
      const c = {
        parentFolderId: document.getElementById('parentFolderId').value.trim(),
        revisionParentFolderId: document.getElementById('revisionParentFolderId').value.trim(),
        pprFolderId: document.getElementById('pprFolderId').value.trim(),
        showInterfaceButton: document.getElementById('showInterfaceButton').checked,
        showReferenceButton: document.getElementById('showReferenceButton').checked,
        showLabelsButton: document.getElementById('showLabelsButton').checked,
        showPprButtons: document.getElementById('showPprButtons').checked,
        showViewRevisionsBtn: document.getElementById('showViewRevisionsBtn').checked
      };
      google.script.run.withSuccessHandler(() => {
        if (window.refreshConfig) window.refreshConfig();
        updateFolderLinks();
      }).saveConfig(c);
    }

    function refreshAllClients(){
      google.script.run.broadcastRefresh();
    }

    function loadClientStats(){
      google.script.run.withSuccessHandler(function(res){
        const tbody = document.querySelector('#clientStats tbody');
        tbody.innerHTML = '';
        res.forEach(r=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${r.clientId}</td><td>${r.count}</td><td>${r.lastActive}</td><td>${r.activity || ''}</td>`;
          tbody.appendChild(tr);
        });
      }).getClientStats();
    }

    document.addEventListener('DOMContentLoaded', () => {
      // wire events
      ['parentFolderId','revisionParentFolderId','pprFolderId'].forEach(id=>{
        document.getElementById(id).addEventListener('input', updateFolderLinks);
      });
      document.getElementById('btnSave').addEventListener('click', () => {
        saveConfig();
        sendActivity('save_config');
      });
      document.getElementById('btnRefreshAll').addEventListener('click', () => {
        refreshAllClients();
        sendActivity('refresh_clients');
      });
      document.getElementById('btnRefreshItems').addEventListener('click', () => {
        google.script.run
          .withSuccessHandler(res => {
            const msg = res && res.ok
              ? `Кешът на артикулите е обновен (общо ${res.count}).`
              : 'Възникна грешка при обновяване на кеша.';
            alert(msg);
          })
          .refreshItemsCache();
        sendActivity('refresh_items_cache');
      });

      loadConfig();
      updateFolderLinks();
      loadClientStats();
      setInterval(loadClientStats, 1000);
      sendActivity('admin_loaded');
    });
  </script>
</body>
</html>
