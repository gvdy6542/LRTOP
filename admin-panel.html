<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <title>Админ панел</title>
  <style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
}

.login-container {
  margin-top: 100px;
}

.login-container input {
  display: block;
  width: 200px;
  margin: 5px auto;
  padding: 8px;
}

.login-container button {
  padding: 8px 16px;
}

.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(0, 0, 0, 0.4);
}

.modal-content {
  background-color: #fff;
  margin: 10% auto;
  padding: 20px;
  max-width: 400px;
  position: relative;
}

.close {
  position: absolute;
  right: 10px;
  top: 10px;
  font-size: 24px;
  cursor: pointer;
}

.button-box {
  margin: 10px;
  text-align: left;
}

.button-box button {
  margin-right: 5px;
  margin-bottom: 5px;
}

.add-btn-form {
  margin-top: 20px;
}

.hidden {
  display: none;
}

.error-msg {
  color: red;
  margin-top: 10px;
}
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Вход</h2>
    <input type="text" id="username" placeholder="Потребител" />
    <input type="password" id="password" placeholder="Парола" />
    <button id="loginBtn">Влез</button>
    <div id="loginError" class="error-msg"></div>
  </div>

  <div id="adminModal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <h2>Админ панел</h2>
      <div id="buttonsArea"></div>
      <div class="add-btn-form">
        <input type="text" id="newBtnText" placeholder="Текст на бутона" />
        <button id="addBtn">Добави бутон</button>
      </div>
    </div>
  </div>

  <script>
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const loginContainer = document.querySelector('.login-container');
const modal = document.getElementById('adminModal');
const closeModal = document.getElementById('closeModal');
const buttonsArea = document.getElementById('buttonsArea');
const addBtn = document.getElementById('addBtn');
const newBtnText = document.getElementById('newBtnText');

loginBtn.addEventListener('click', () => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  loginError.textContent = '';
  google.script.run.withSuccessHandler(res => {
    if (!res.success) {
      loginError.textContent = res.message || 'Невалиден потребител или парола!';
      return;
    }
    loginContainer.style.display = 'none';
    modal.style.display = 'block';
    loadInitialButtons();
  }).login(username, password);
});

closeModal.addEventListener('click', () => {
  modal.style.display = 'none';
});

window.addEventListener('click', (event) => {
  if (event.target === modal) {
    modal.style.display = 'none';
  }
});

let buttonsInitialized = false;
function loadInitialButtons() {
  if (buttonsInitialized) return;
  buttonsInitialized = true;
  addAdminButton('Бутон 1');
  addAdminButton('Бутон 2');
  addAdminButton('Бутон 3');
}

function addAdminButton(text) {
  const box = document.createElement('div');
  box.className = 'button-box';

  const btn = document.createElement('button');
  btn.textContent = text;
  box.appendChild(btn);

  const label = document.createElement('label');
  label.style.marginLeft = '10px';
  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = true;
  checkbox.addEventListener('change', () => {
    btn.classList.toggle('hidden', !checkbox.checked);
  });
  label.appendChild(checkbox);
  label.appendChild(document.createTextNode(' Показвай'));

  const removeBtn = document.createElement('button');
  removeBtn.textContent = 'Изтрий';
  removeBtn.style.marginLeft = '10px';
  removeBtn.addEventListener('click', () => {
    buttonsArea.removeChild(box);
  });

  box.appendChild(label);
  box.appendChild(removeBtn);
  buttonsArea.appendChild(box);
}

addBtn.addEventListener('click', () => {
  const text = newBtnText.value.trim();
  if (text) {
    addAdminButton(text);
    newBtnText.value = '';
  } else {
    alert('Въведете текст за бутона!');
  }
});
  </script>
</body>
</html>
