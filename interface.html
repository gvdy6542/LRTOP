<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ИНВЕНТАРИЗАЦИЯ  </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f4f4f9;
    }
    iframe {
      border: none;
      width: 90%;
      height: 80%;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }
    h1 {
      margin-bottom: 20px;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Съдържание на папката</h1>
  <iframe src="https://drive.google.com/embeddedfolderview?id=1PqVTfIpJKQRuxUcxwHVubfNOsvRTWzXG#grid"></iframe>
  <script>
    let lastRefreshTs = null;
    function pollRefresh(){
      google.script.run.withSuccessHandler(function(ts){
        if(lastRefreshTs && ts && ts !== lastRefreshTs){
          if(window.refreshConfig) window.refreshConfig();
          location.reload();
        }
        lastRefreshTs = ts;
      }).getRefreshTimestamp();
    }
    document.addEventListener('DOMContentLoaded', () => {
      pollRefresh();
      setInterval(pollRefresh, 60000);
    });
  </script>
</body>
</html>
