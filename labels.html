<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Генератор на етикети</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    label, input { display: block; margin-bottom: 8px; }
    #labelsContainer { margin-top: 20px; }
    .label { border: 1px solid #000; padding: 5px; margin: 5px 0; width: fit-content; }
  </style>
</head>
<body>
  <h1>Генериране на етикети</h1>
  <label>Текст на етикета:
    <input type="text" id="labelText">
  </label>
  <label>Цена:
    <input type="text" id="price">
  </label>
  <label>Баркод:
    <input type="text" id="barcodeField">
  </label>
  <button onclick="scanBarcode()">Сканирай</button>
  <button onclick="generateSheet()">Генерирай лист</button>
  <button onclick="addLabel()">Добави етикет</button>
  <button onclick="printLabels()">Печат</button>
  <div id="labelsContainer"></div>
<script>
function addLabel() {
  const text = document.getElementById('labelText').value.trim();
  const price = document.getElementById('price').value.trim();
  if (!text && !price) return;
  const div = document.createElement('div');
  div.className = 'label';
  div.textContent = text + (price ? ' - ' + price : '');
  document.getElementById('labelsContainer').appendChild(div);
}
function printLabels() {
  const html = '<html><head><title>Print</title></head><body>' +
               document.getElementById('labelsContainer').innerHTML +
               '</body></html>';
  const w = window.open('', '', 'width=400,height=600');
  w.document.write(html);
  w.document.close();
  w.focus();
  w.print();
  w.close();
}

const EUR_RATE = 1.95583;
let scanned = [];

function scanBarcode() {
  const bc = document.getElementById('barcodeField').value.trim();
  if (!bc) return;
  google.script.run.withSuccessHandler(item => {
    if (!item) {
      alert('Артикулът не е намерен.');
      return;
    }
    const priceEur = item.price ? (item.price / EUR_RATE).toFixed(2) : '';
    const div = document.createElement('div');
    div.className = 'label';
    div.textContent = `${item.name} - ${item.price.toFixed(2)} лв / ${priceEur} €`;
    document.getElementById('labelsContainer').appendChild(div);
    scanned.push(item.barcode);
    document.getElementById('barcodeField').value = '';
  }).fetchProductByBarcode(bc);
}

function generateSheet() {
  if (!scanned.length) {
    alert('Няма сканирани артикули.');
    return;
  }
  google.script.run.withSuccessHandler(url => {
    window.open(url, '_blank');
  }).runGenerateLabels(scanned);
}
</script>
</body>
</html>
