<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="common.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    button { margin: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h3>Изберете режим</h3>
  <button onclick="openMenu()">Меню</button>
  <button onclick="openLabels()">Етикети</button>

  <script>
    function openMenu() {
      sendActivity('open_menu');
      google.script.run.showMenuSidebar();
      google.script.host.close(); // Затваря този sidebar
    }
    function openLabels() {
      sendActivity('open_labels');
      google.script.run.showLabelsSidebar();
      google.script.host.close();
    }
  </script>
  <script>
    let lastRefreshTs = null;
    function pollRefresh(){
      google.script.run.withSuccessHandler(function(ts){
        if(lastRefreshTs && ts && ts !== lastRefreshTs){
          if(window.refreshConfig) window.refreshConfig();
          location.reload();
        }
        lastRefreshTs = ts;
      }).getRefreshTimestamp();
    }
    document.addEventListener('DOMContentLoaded', () => {
      pollRefresh();
      setInterval(pollRefresh, 60000);
      sendActivity('selection_loaded');
    });
  </script>
</body>
</html>
