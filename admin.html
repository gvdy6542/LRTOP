<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body{font-family:Arial, sans-serif;margin:20px;}
    label{display:block;margin-bottom:6px;}
    input[type="text"]{width:100%;max-width:400px;}
  </style>
</head>
<body>
  <h2>Админ конфигурация</h2>
  <label>Parent Folder ID:
    <input type="text" id="parentFolderId">
  </label>
  <label>Revision Folder ID:
    <input type="text" id="revisionParentFolderId">
  </label>
  <label>PPR Folder ID:
    <input type="text" id="pprFolderId">
  </label>
  <h3>Бутони</h3>
  <label><input type="checkbox" id="showInterfaceButton"> Показвай "Обработка"</label>
  <label><input type="checkbox" id="showReferenceButton"> Показвай "ИНВЕНТАРИЗАЦИЯ"</label>
  <label><input type="checkbox" id="showLabelsButton"> Показвай "Етикети"</label>
  <label><input type="checkbox" id="showPprButtons"> Показвай бутоните за ППР</label>
  <label><input type="checkbox" id="showViewRevisionsBtn"> Показвай "Преглед на ревизии"</label>
  <button onclick="saveConfig()">Запази</button>
  <script>
    function loadConfig(){
      google.script.run.withSuccessHandler(function(c){
        document.getElementById('parentFolderId').value = c.parentFolderId;
        document.getElementById('revisionParentFolderId').value = c.revisionParentFolderId;
        document.getElementById('pprFolderId').value = c.pprFolderId;
        document.getElementById('showInterfaceButton').checked = c.showInterfaceButton;
        document.getElementById('showReferenceButton').checked = c.showReferenceButton;
        document.getElementById('showLabelsButton').checked = c.showLabelsButton;
        document.getElementById('showPprButtons').checked = c.showPprButtons;
        document.getElementById('showViewRevisionsBtn').checked = c.showViewRevisionsBtn;
      }).getConfig();
    }
    function saveConfig(){
      var c = {
        parentFolderId: document.getElementById('parentFolderId').value.trim(),
        revisionParentFolderId: document.getElementById('revisionParentFolderId').value.trim(),
        pprFolderId: document.getElementById('pprFolderId').value.trim(),
        showInterfaceButton: document.getElementById('showInterfaceButton').checked,
        showReferenceButton: document.getElementById('showReferenceButton').checked,
        showLabelsButton: document.getElementById('showLabelsButton').checked,
        showPprButtons: document.getElementById('showPprButtons').checked,
        showViewRevisionsBtn: document.getElementById('showViewRevisionsBtn').checked
      };
      google.script.run
        .withSuccessHandler(() => {
          if (window.refreshConfig) window.refreshConfig();
          loadConfig();
        })
        .saveConfig(c);
    }
    document.addEventListener('DOMContentLoaded', loadConfig);
  </script>
</body>
</html>
