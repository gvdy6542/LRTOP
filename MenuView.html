<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Меню</title>
  <script src="common.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      background: #f6f8fa;
    }
    #menuList div {
      padding: 5px 0;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h3>Меню</h3>
  <button onclick="loadMenu()">Зареди менюто</button>
  <div id="menuList" style="margin-top: 10px;">Натиснете бутона</div>

  <script>
    function loadMenu() {
      sendActivity('load_menu');
      google.script.run.withSuccessHandler(items => {
        const container = document.getElementById('menuList');
        if (!items || items.length === 0) {
          container.innerHTML = '<em>Няма елементи в листа "Меню"</em>';
          return;
        }
        container.innerHTML = '';
        items.forEach(item => {
          const div = document.createElement('div');
          div.textContent = `${item.name} - ${item.price} лв.`;
          container.appendChild(div);
        });
      }).fetchMenuData();
    }
  </script>
  <script>
    let lastRefreshTs = null;
    function pollRefresh(){
      google.script.run.withSuccessHandler(function(ts){
        if(lastRefreshTs && ts && ts !== lastRefreshTs){
          if(window.refreshConfig) window.refreshConfig();
          location.reload();
        }
        lastRefreshTs = ts;
      }).getRefreshTimestamp();
    }
    document.addEventListener('DOMContentLoaded', () => {
      pollRefresh();
      setInterval(pollRefresh, 60000);
      sendActivity('menu_loaded');
    });
  </script>
</body>
</html>
